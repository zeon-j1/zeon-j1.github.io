<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music List</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #222222;
    --accent: #c8f545;
    --accent-dim: #8aab1e;
    --text: #e8e8e8;
    --muted: #555555;
    --danger: #ff4444;
    --warn: #f5a623;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
    padding: 48px 24px;
  }

  header {
    max-width: 780px;
    margin: 0 auto 48px;
    border-left: 3px solid var(--accent);
    padding-left: 20px;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 10vw, 96px);
    line-height: 0.9;
    letter-spacing: 2px;
    color: var(--text);
  }

  header h1 span { color: var(--accent); }

  header p {
    margin-top: 10px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .container { max-width: 780px; margin: 0 auto; }

  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 10px 14px 10px 36px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus { border-color: var(--accent); }

  .search-wrap::before {
    content: "⌕";
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
    pointer-events: none;
  }

  .btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 10px 16px;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }
  .btn.primary:hover { background: var(--accent-dim); border-color: var(--accent-dim); color: #000; }
  .btn.warn { border-color: var(--warn); color: var(--warn); }
  .btn.warn:hover { background: var(--warn); color: #000; }

  #csv-input { display: none; }

  .stats {
    display: flex;
    gap: 24px;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    flex-wrap: wrap;
    align-items: center;
  }

  .stats span { color: var(--accent); }

  .dupe-badge {
    margin-left: auto;
    background: var(--warn);
    color: #000;
    font-size: 10px;
    font-weight: bold;
    letter-spacing: 1px;
    padding: 3px 10px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .dupe-badge:hover { opacity: 0.8; }

  .table-wrap { overflow-x: auto; }

  table { width: 100%; border-collapse: collapse; }

  thead th {
    text-align: left;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 12px 10px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }

  thead th:hover { color: var(--accent); }
  thead th.sorted { color: var(--accent); }
  thead th .sort-icon { margin-left: 4px; opacity: 0.6; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    animation: fadeIn 0.3s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  tbody tr:hover { background: var(--surface); }

  tbody td { padding: 13px 12px; vertical-align: middle; }

  .td-num { color: var(--muted); font-size: 11px; width: 40px; }
  .td-artist { font-weight: 400; color: var(--text); }
  .td-song { color: #999; font-style: italic; }
  .td-del { width: 36px; text-align: center; }

  .del-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 2px 6px;
    transition: color 0.15s;
    font-family: monospace;
  }
  .del-btn:hover { color: var(--danger); }

  .empty {
    text-align: center;
    padding: 64px 0;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 1px;
  }
  .empty p:first-child { font-size: 32px; margin-bottom: 12px; }

  /* ── Modals ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 32px;
    width: 100%;
    max-width: 420px;
    animation: slideUp 0.2s ease;
  }

  /* Duplicate review modal is wider */
  .modal.dupe-modal { max-width: 640px; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .modal h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 1px;
    margin-bottom: 6px;
    color: var(--accent);
  }

  .modal .modal-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus { border-color: var(--accent); }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
    justify-content: flex-end;
  }

  /* Duplicate card */
  .dupe-progress {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .dupe-progress span { color: var(--warn); }

  .dupe-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .dupe-card {
    border: 1px solid var(--border);
    padding: 16px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
  }
  .dupe-card:hover { border-color: var(--accent); background: rgba(200,245,69,0.04); }
  .dupe-card.selected { border-color: var(--accent); background: rgba(200,245,69,0.08); }
  .dupe-card.selected::after {
    content: "KEEP";
    position: absolute;
    top: 8px; right: 8px;
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--accent);
    font-weight: bold;
  }

  .dupe-card-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .dupe-card-artist {
    font-size: 14px;
    color: var(--text);
    margin-bottom: 4px;
  }

  .dupe-card-song {
    font-size: 12px;
    color: #999;
    font-style: italic;
  }

  /* Highlight differing chars */
  .diff { color: var(--warn); }

  .dupe-score {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 20px;
    letter-spacing: 1px;
  }
  .dupe-score span { color: var(--warn); }

  .dupe-actions {
    display: flex;
    gap: 10px;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
  }

  .dupe-actions-right { display: flex; gap: 10px; }

  /* Save indicator / footer */
  .save-indicator {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
    transition: color 0.3s;
  }
  .save-indicator .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
    flex-shrink: 0;
  }
  .save-indicator.saved { color: var(--accent); }
  .save-indicator.saved .dot { background: var(--accent); }

  .footer {
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .footer-links { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn.ghost {
    font-size: 10px;
    padding: 7px 12px;
    color: var(--muted);
    border-color: transparent;
  }
  .btn.ghost:hover { color: var(--accent); border-color: var(--border); }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--accent);
    color: #000;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 1px;
    padding: 12px 20px;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.25s ease;
    z-index: 200;
    pointer-events: none;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body>

<header>
  <h1>My<br><span>Music</span><br>List</h1>
  <p>Artist &amp; Song Collection</p>
</header>

<div class="container">
  <div class="controls">
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Search artists or songs..." oninput="renderTable()">
    </div>
    <button class="btn" onclick="document.getElementById('csv-input').click()">Import CSV</button>
    <button class="btn" onclick="exportCSV()">Export CSV</button>
    <button class="btn primary" onclick="openModal()">+ Add Entry</button>
    <input type="file" id="csv-input" accept=".csv,.txt" onchange="importCSV(event)">
  </div>

  <div class="stats">
    <div>Total: <span id="stat-total">0</span></div>
    <div>Artists: <span id="stat-artists">0</span></div>
    <div id="stat-filter-wrap" style="display:none">Showing: <span id="stat-filtered">0</span></div>
    <div id="dupe-badge-wrap" style="display:none">
      <div class="dupe-badge" onclick="openDupeModal()" id="dupe-badge"></div>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="td-num">#</th>
          <th id="th-artist" class="sorted" onclick="setSort('artist')">Artist <span class="sort-icon" id="icon-artist">↑</span></th>
          <th id="th-song" onclick="setSort('song')">Song <span class="sort-icon" id="icon-song"></span></th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="footer">
    <div class="save-indicator" id="save-indicator">
      <div class="dot"></div>
      <span id="save-label">No changes</span>
    </div>
    <div class="footer-links">
      <button class="btn ghost" onclick="clearSaved()">Clear saved data</button>
      <button class="btn ghost" onclick="downloadPythonScript()">&#8595; Download Python script</button>
    </div>
  </div>
</div>

<!-- Add Entry Modal -->
<div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
  <div class="modal">
    <h2>Add Entry</h2>
    <div class="field">
      <label>Artist</label>
      <input type="text" id="input-artist" placeholder="e.g. AZALI" onkeydown="modalKey(event)">
    </div>
    <div class="field">
      <label>Song</label>
      <input type="text" id="input-song" placeholder="e.g. Decisive Battle" onkeydown="modalKey(event)">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="addEntry()">Add</button>
    </div>
  </div>
</div>

<!-- Duplicate Review Modal -->
<div class="modal-overlay" id="dupe-modal" onclick="closeDupeModalOutside(event)">
  <div class="modal dupe-modal">
    <h2>Review Duplicates</h2>
    <p class="modal-sub">Click the entry to keep, then confirm.</p>
    <div class="dupe-progress">Pair <span id="dupe-current">1</span> of <span id="dupe-total">1</span></div>
    <div class="dupe-score">Similarity: <span id="dupe-score-val">—</span></div>
    <div class="dupe-cards">
      <div class="dupe-card" id="dupe-card-a" onclick="selectDupe(0)">
        <div class="dupe-card-label">Entry A</div>
        <div class="dupe-card-artist" id="dupe-a-artist"></div>
        <div class="dupe-card-song" id="dupe-a-song"></div>
      </div>
      <div class="dupe-card" id="dupe-card-b" onclick="selectDupe(1)">
        <div class="dupe-card-label">Entry B</div>
        <div class="dupe-card-artist" id="dupe-b-artist"></div>
        <div class="dupe-card-song" id="dupe-b-song"></div>
      </div>
    </div>
    <div class="dupe-actions">
      <button class="btn" onclick="closeDupeModal()">Close</button>
      <div class="dupe-actions-right">
        <button class="btn" onclick="skipDupe()">Skip</button>
        <button class="btn warn" id="dupe-keep-btn" onclick="confirmDupe()" disabled>Remove other</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'musicList_entries';
  let entries = [];
  let sortKey = 'artist';
  let sortDir = 1;
  let saveTimer = null;

  // Duplicate review state
  let dupePairs = [];
  let dupeIndex = 0;
  let dupeSelected = null; // 0 = keep A, 1 = keep B

  /* ── Levenshtein / fuzzy ── */
  function levenshtein(a, b) {
    a = a.toLowerCase(); b = b.toLowerCase();
    if (a === b) return 0;
    if (a.length < b.length) [a, b] = [b, a];
    let prev = [...Array(b.length + 1).keys()];
    for (let i = 0; i < a.length; i++) {
      const curr = [i + 1];
      for (let j = 0; j < b.length; j++) {
        curr.push(Math.min(prev[j + 1] + 1, curr[j] + 1, prev[j] + (a[i] !== b[j] ? 1 : 0)));
      }
      prev = curr;
    }
    return prev[b.length];
  }

  function similarity(a, b) {
    const maxLen = Math.max(a.length, b.length);
    if (maxLen === 0) return 1;
    return 1 - levenshtein(a, b) / maxLen;
  }

  function findFuzzyDupes(list, threshold = 0.82) {
    const pairs = [];
    const seen = new Set();
    for (let i = 0; i < list.length; i++) {
      for (let j = i + 1; j < list.length; j++) {
        const a = list[i], b = list[j];
        if (a.artist.toLowerCase() === b.artist.toLowerCase() &&
            a.song.toLowerCase() === b.song.toLowerCase()) continue;
        const artistSim = similarity(a.artist, b.artist);
        const songSim   = similarity(a.song, b.song);
        const avg = (artistSim + songSim) / 2;
        const key = `${i}-${j}`;
        if (avg >= threshold && !seen.has(key)) {
          seen.add(key);
          pairs.push({ a, b, score: avg });
        }
      }
    }
    return pairs.sort((x, y) => y.score - x.score);
  }

  /* Highlight differing characters between two strings */
  function diffHighlight(source, target) {
    // Simple char-by-char highlight of positions that differ
    let out = '';
    const maxLen = Math.max(source.length, target.length);
    for (let i = 0; i < source.length; i++) {
      const sc = source[i] || '';
      const tc = target[i] || '';
      const esc_c = sc.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      out += (sc.toLowerCase() !== tc.toLowerCase())
        ? `<span class="diff">${esc_c}</span>`
        : esc_c;
    }
    return out;
  }

  /* ── Dupe modal ── */
  function openDupeModal() {
    dupePairs = findFuzzyDupes(entries);
    if (dupePairs.length === 0) { toast('No near-duplicates found!'); return; }
    dupeIndex = 0;
    dupeSelected = null;
    renderDupePair();
    document.getElementById('dupe-modal').classList.add('open');
  }

  function closeDupeModal() {
    document.getElementById('dupe-modal').classList.remove('open');
    checkDupes(); // refresh badge
  }

  function closeDupeModalOutside(e) {
    if (e.target === document.getElementById('dupe-modal')) closeDupeModal();
  }

  function renderDupePair() {
    const pair = dupePairs[dupeIndex];
    document.getElementById('dupe-current').textContent = dupeIndex + 1;
    document.getElementById('dupe-total').textContent = dupePairs.length;
    document.getElementById('dupe-score-val').textContent = Math.round(pair.score * 100) + '%';

    // Artist/song with diffs highlighted
    document.getElementById('dupe-a-artist').innerHTML = diffHighlight(pair.a.artist, pair.b.artist);
    document.getElementById('dupe-a-song').innerHTML   = diffHighlight(pair.a.song,   pair.b.song);
    document.getElementById('dupe-b-artist').innerHTML = diffHighlight(pair.b.artist, pair.a.artist);
    document.getElementById('dupe-b-song').innerHTML   = diffHighlight(pair.b.song,   pair.a.song);

    // Reset selection
    dupeSelected = null;
    document.getElementById('dupe-card-a').classList.remove('selected');
    document.getElementById('dupe-card-b').classList.remove('selected');
    document.getElementById('dupe-keep-btn').disabled = true;
  }

  function selectDupe(which) {
    dupeSelected = which;
    document.getElementById('dupe-card-a').classList.toggle('selected', which === 0);
    document.getElementById('dupe-card-b').classList.toggle('selected', which === 1);
    document.getElementById('dupe-keep-btn').disabled = false;
  }

  function confirmDupe() {
    if (dupeSelected === null) return;
    const pair = dupePairs[dupeIndex];
    const toRemove = dupeSelected === 0 ? pair.b : pair.a;

    entries = entries.filter(e => !(e.artist === toRemove.artist && e.song === toRemove.song));
    renderTable();
    scheduleSave();
    toast('Duplicate removed.');

    // Rebuild pairs from updated list and advance
    dupePairs = findFuzzyDupes(entries);
    if (dupeIndex >= dupePairs.length) dupeIndex = 0;

    if (dupePairs.length === 0) {
      closeDupeModal();
      toast('All duplicates resolved!');
    } else {
      dupeSelected = null;
      renderDupePair();
    }
  }

  function skipDupe() {
    dupeIndex = (dupeIndex + 1) % dupePairs.length;
    dupeSelected = null;
    renderDupePair();
  }

  /* ── Check dupes & update badge ── */
  function checkDupes() {
    const pairs = findFuzzyDupes(entries);
    const wrap = document.getElementById('dupe-badge-wrap');
    const badge = document.getElementById('dupe-badge');
    if (pairs.length > 0) {
      wrap.style.display = '';
      badge.textContent = `⚠ ${pairs.length} possible duplicate${pairs.length > 1 ? 's' : ''}`;
    } else {
      wrap.style.display = 'none';
    }
  }

  /* ── Persistence ── */
  function saveToStorage() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
      setSaveIndicator('saved');
    } catch(e) { setSaveIndicator('error'); }
  }

  function loadFromStorage() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) { entries = JSON.parse(raw); setSaveIndicator('saved'); return true; }
    } catch(e) {}
    return false;
  }

  function setSaveIndicator(state) {
    const el = document.getElementById('save-indicator');
    const label = document.getElementById('save-label');
    el.classList.remove('saved');
    if (state === 'saved') { el.classList.add('saved'); label.textContent = 'Saved in browser'; }
    else if (state === 'unsaved') { label.textContent = 'Unsaved changes...'; }
    else if (state === 'error') { label.textContent = 'Save failed'; }
    else { label.textContent = 'No data saved'; }
  }

  function scheduleSave() {
    setSaveIndicator('unsaved');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveToStorage, 800);
  }

  function clearSaved() {
    if (!confirm('Clear all saved data from this browser? Your current list will be wiped.')) return;
    try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
    entries = [];
    renderTable();
    setSaveIndicator('none');
    toast('Saved data cleared.');
  }

  /* ── Render ── */
  function renderTable() {
    const query = document.getElementById('search').value.toLowerCase().trim();
    let filtered = query
      ? entries.filter(e => e.artist.toLowerCase().includes(query) || e.song.toLowerCase().includes(query))
      : entries;

    const sorted = [...filtered].sort((a, b) => {
      const va = a[sortKey].toLowerCase(), vb = b[sortKey].toLowerCase();
      return va < vb ? -sortDir : va > vb ? sortDir : 0;
    });

    const tbody = document.getElementById('tbody');
    if (sorted.length === 0) {
      tbody.innerHTML = `<tr><td colspan="4"><div class="empty"><p>&#9834;</p><p>${query ? 'No matches found.' : 'No entries yet. Import a CSV or add one!'}</p></div></td></tr>`;
    } else {
      tbody.innerHTML = sorted.map((e, i) => `
        <tr style="animation-delay:${Math.min(i * 0.03, 0.5)}s">
          <td class="td-num">${i + 1}</td>
          <td class="td-artist">${esc(e.artist)}</td>
          <td class="td-song">${esc(e.song)}</td>
          <td class="td-del"><button class="del-btn" onclick="deleteEntry('${esc(e.artist)}','${esc(e.song)}')" title="Remove">&#215;</button></td>
        </tr>`).join('');
    }

    document.getElementById('stat-total').textContent = entries.length;
    document.getElementById('stat-artists').textContent = new Set(entries.map(e => e.artist)).size;
    const fw = document.getElementById('stat-filter-wrap');
    if (query) { fw.style.display = ''; document.getElementById('stat-filtered').textContent = sorted.length; }
    else { fw.style.display = 'none'; }

    checkDupes();
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  /* ── Sort ── */
  function setSort(key) {
    if (sortKey === key) sortDir *= -1; else { sortKey = key; sortDir = 1; }
    ['artist','song'].forEach(k => {
      document.getElementById('th-' + k).classList.toggle('sorted', k === sortKey);
      document.getElementById('icon-' + k).textContent = k === sortKey ? (sortDir === 1 ? '↑' : '↓') : '';
    });
    renderTable();
  }

  /* ── Add ── */
  function openModal() {
    document.getElementById('modal').classList.add('open');
    setTimeout(() => document.getElementById('input-artist').focus(), 50);
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    document.getElementById('input-artist').value = '';
    document.getElementById('input-song').value = '';
  }

  function closeModalOutside(e) {
    if (e.target === document.getElementById('modal')) closeModal();
  }

  function modalKey(e) { if (e.key === 'Enter') addEntry(); if (e.key === 'Escape') closeModal(); }

  function addEntry() {
    const artist = document.getElementById('input-artist').value.trim();
    const song   = document.getElementById('input-song').value.trim();
    if (!artist || !song) { toast('Fill in both fields!'); return; }
    const isDupe = entries.some(e => e.artist.toLowerCase() === artist.toLowerCase() && e.song.toLowerCase() === song.toLowerCase());
    if (isDupe) { toast('Entry already exists!'); return; }
    entries.push({ artist, song });
    closeModal();
    renderTable();
    scheduleSave();
    toast('Entry added!');
  }

  /* ── Delete ── */
  function deleteEntry(artist, song) {
    entries = entries.filter(e => !(e.artist === artist && e.song === song));
    renderTable();
    scheduleSave();
    toast('Entry removed.');
  }

  /* ── Import CSV ── */
  function importCSV(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      const lines = e.target.result.split(/\r?\n/).filter(l => l.trim());
      let added = 0, skipped = 0;
      lines.forEach((line, i) => {
        const cols = line.split(',');
        if (cols.length < 2) return;
        const artist = cols[0].replace(/^"|"$/g,'').trim();
        const song   = cols[1].replace(/^"|"$/g,'').trim();
        if (i === 0 && artist.toLowerCase() === 'artist') return;
        if (!artist || !song) return;
        const isDupe = entries.some(e => e.artist.toLowerCase() === artist.toLowerCase() && e.song.toLowerCase() === song.toLowerCase());
        if (isDupe) { skipped++; return; }
        entries.push({ artist, song });
        added++;
      });
      renderTable();
      scheduleSave();
      toast(`Imported ${added} entries${skipped ? `, ${skipped} skipped` : ''}.`);
    };
    reader.readAsText(file);
    event.target.value = '';
  }

  /* ── Export CSV ── */
  function exportCSV() {
    if (entries.length === 0) { toast('Nothing to export!'); return; }
    const sorted = [...entries].sort((a, b) => a.artist.toLowerCase() < b.artist.toLowerCase() ? -1 : 1);
    const rows = ['Artist,Song', ...sorted.map(e => `${csvCell(e.artist)},${csvCell(e.song)}`)];
    const blob = new Blob([rows.join('\r\n')], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'music_list.csv';
    a.click();
    toast('CSV exported!');
  }

  function csvCell(v) {
    return /[,"\n]/.test(v) ? `"${v.replace(/"/g,'""')}"` : v;
  }

  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');

    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
  }

  /* ── Init ── */
  const hadSaved = loadFromStorage();
  renderTable();
  if (!hadSaved) setSaveIndicator('none');
</script>
</body>
